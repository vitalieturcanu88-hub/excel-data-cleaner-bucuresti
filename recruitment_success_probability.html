
<div style="padding: 1rem 0;">
  <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 1.5rem; flex-wrap: wrap;">
    <div>
      <label style="font-size: 13px; color: var(--color-text-secondary); display: block; margin-bottom: 4px;">Aplicări trimise total</label>
      <div style="display: flex; align-items: center; gap: 10px;">
        <input type="range" min="10" max="300" value="120" id="apps" step="10" style="width: 180px;" />
        <span style="font-size: 16px; font-weight: 500; min-width: 36px;" id="apps-out">120</span>
      </div>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.5rem;">
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">Azi</div>
      <div style="font-size: 22px; font-weight: 500;" id="stat-day">—</div>
    </div>
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">1 săptămână</div>
      <div style="font-size: 22px; font-weight: 500;" id="stat-week">—</div>
    </div>
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">2 săptămâni</div>
      <div style="font-size: 22px; font-weight: 500;" id="stat-2w">—</div>
    </div>
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">1 lună</div>
      <div style="font-size: 22px; font-weight: 500;" id="stat-month">—</div>
    </div>
    <div style="background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem;">
      <div style="font-size: 12px; color: var(--color-text-secondary); margin-bottom: 4px;">2 luni</div>
      <div style="font-size: 22px; font-weight: 500;" id="stat-2m">—</div>
    </div>
  </div>

  <div style="position: relative; width: 100%; height: 280px;">
    <canvas id="myChart"></canvas>
  </div>

  <div style="display: flex; flex-wrap: wrap; gap: 16px; margin-top: 12px; font-size: 12px; color: var(--color-text-secondary);">
    <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #1D9E75;"></span>Cu volum actual (<span id="leg-current">120</span> aplicări)</span>
    <span style="display: flex; align-items: center; gap: 5px;"><span style="width: 10px; height: 10px; border-radius: 2px; background: #888780;"></span>Cu 30 aplicări (comparație)</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const labels = ['Azi', '3 zile', '1 săpt', '2 săpt', '3 săpt', '1 lună', '6 săpt', '2 luni'];
const timeWeights = [0.05, 0.12, 0.22, 0.35, 0.48, 0.62, 0.75, 0.87];

function calcProb(apps, timeW) {
  const volumeFactor = 1 - Math.pow(0.978, apps);
  const raw = volumeFactor * timeW;
  return Math.min(raw, 0.97);
}

function pct(v) { return Math.round(v * 100) + '%'; }

const statIds = ['stat-day','stat-week','stat-2w','stat-month','stat-2m'];
const statIdxs = [0, 2, 3, 5, 7];

let chart;

function buildData(apps) {
  return timeWeights.map(tw => Math.round(calcProb(apps, tw) * 100));
}

function update(apps) {
  document.getElementById('apps-out').textContent = apps;
  document.getElementById('leg-current').textContent = apps;
  statIds.forEach((id, i) => {
    document.getElementById(id).textContent = pct(calcProb(apps, timeWeights[statIdxs[i]]));
  });
  if (chart) {
    chart.data.datasets[0].data = buildData(apps);
    chart.update();
  }
}

const slider = document.getElementById('apps');
slider.addEventListener('input', () => update(parseInt(slider.value)));

chart = new Chart(document.getElementById('myChart'), {
  type: 'line',
  data: {
    labels,
    datasets: [
      {
        label: 'Volum actual',
        data: buildData(120),
        borderColor: '#1D9E75',
        backgroundColor: 'rgba(29,158,117,0.08)',
        borderWidth: 2,
        pointBackgroundColor: '#1D9E75',
        pointRadius: 4,
        fill: true,
        tension: 0.4
      },
      {
        label: '30 aplicări',
        data: buildData(30),
        borderColor: '#888780',
        backgroundColor: 'rgba(136,135,128,0.05)',
        borderWidth: 1.5,
        pointBackgroundColor: '#888780',
        pointRadius: 3,
        fill: true,
        tension: 0.4,
        borderDash: [4, 3]
      }
    ]
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: {
        callbacks: {
          label: ctx => ' ' + ctx.dataset.label + ': ' + ctx.parsed.y + '%'
        }
      }
    },
    scales: {
      y: {
        min: 0, max: 100,
        ticks: { callback: v => v + '%', font: { size: 12 }, color: '#888780' },
        grid: { color: 'rgba(136,135,128,0.15)' }
      },
      x: {
        ticks: { font: { size: 12 }, color: '#888780', autoSkip: false },
        grid: { display: false }
      }
    }
  }
});

update(120);
</script>
